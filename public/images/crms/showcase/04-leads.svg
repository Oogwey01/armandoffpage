<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" font-family="Barlow, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg4)"/>

  <!-- Top bar -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#141414" stroke="#232323"/>
  <text x="40" y="45" fill="#C89D69" font-size="12" font-weight="700" letter-spacing="1.5">LEADS · SEGMENTACIÓN AUTOMÁTICA</text>
  <rect x="680" y="30" width="80" height="20" rx="10" fill="#C89D69" fill-opacity="0.14"/>
  <text x="720" y="43" fill="#C89D69" font-size="9" font-weight="700" text-anchor="middle">+ NUEVO</text>

  <!-- Left: Form -->
  <g transform="translate(20,80)">
    <rect width="320" height="350" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">CAPTURA</text>
    <text x="20" y="58" fill="#fff" font-size="18" font-weight="800">Solicitar diagnóstico</text>

    <!-- Field 1 -->
    <text x="20" y="92" fill="#666" font-size="9" font-weight="600" letter-spacing="1.2">NOMBRE</text>
    <rect x="20" y="100" width="280" height="36" rx="6" fill="#0a0a0a" stroke="#242424"/>
    <text x="32" y="123" fill="#fff" font-size="11">Marcela Vega</text>

    <!-- Field 2 -->
    <text x="20" y="158" fill="#666" font-size="9" font-weight="600" letter-spacing="1.2">EMAIL</text>
    <rect x="20" y="166" width="280" height="36" rx="6" fill="#0a0a0a" stroke="#242424"/>
    <text x="32" y="189" fill="#fff" font-size="11">marcela@tiendaroja.mx</text>

    <!-- Field 3 -->
    <text x="20" y="224" fill="#666" font-size="9" font-weight="600" letter-spacing="1.2">FACTURACIÓN MENSUAL</text>
    <rect x="20" y="232" width="280" height="36" rx="6" fill="#0a0a0a" stroke="#C89D69" stroke-opacity="0.5"/>
    <text x="32" y="255" fill="#C89D69" font-size="11" font-weight="700">$500K – $1M MXN</text>
    <polygon points="286,248 290,252 294,248" fill="#C89D69"/>

    <!-- Field 4 -->
    <text x="20" y="290" fill="#666" font-size="9" font-weight="600" letter-spacing="1.2">CANAL PRIORITARIO</text>
    <rect x="20" y="298" width="80" height="24" rx="12" fill="#C89D69" fill-opacity="0.18" stroke="#C89D69" stroke-opacity="0.5"/>
    <text x="60" y="314" fill="#C89D69" font-size="9" font-weight="700" text-anchor="middle">META ADS</text>
    <rect x="106" y="298" width="50" height="24" rx="12" fill="none" stroke="#262626"/>
    <text x="131" y="314" fill="#666" font-size="9" font-weight="700" text-anchor="middle">ML</text>
    <rect x="162" y="298" width="70" height="24" rx="12" fill="none" stroke="#262626"/>
    <text x="197" y="314" fill="#666" font-size="9" font-weight="700" text-anchor="middle">TIKTOK</text>

    <!-- Submit -->
    <rect x="180" y="334" width="120" height="8" fill="none"/>
  </g>

  <!-- Right: Leads list with scores -->
  <g transform="translate(360,80)">
    <rect width="420" height="350" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">LEADS · HOY</text>
    <text x="386" y="28" fill="#C89D69" font-size="10" font-weight="700" text-anchor="end">24</text>

    <!-- Lead row template -->
    <!-- HOT -->
    <g transform="translate(20,50)">
      <rect width="380" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
      <circle cx="30" cy="30" r="14" fill="#C89D69" fill-opacity="0.22"/>
      <text x="30" y="35" fill="#C89D69" font-size="11" font-weight="800" text-anchor="middle">MV</text>
      <text x="58" y="26" fill="#fff" font-size="12" font-weight="700">Marcela Vega</text>
      <text x="58" y="42" fill="#888" font-size="10">Tienda Roja · Meta Ads</text>
      <rect x="280" y="18" width="56" height="22" rx="11" fill="#C89D69"/>
      <text x="308" y="33" fill="#111" font-size="9" font-weight="800" text-anchor="middle">HOT · 92</text>
      <text x="348" y="35" fill="#666" font-size="9">12m</text>
    </g>

    <!-- WARM -->
    <g transform="translate(20,120)">
      <rect width="380" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
      <circle cx="30" cy="30" r="14" fill="#D4B48A" fill-opacity="0.22"/>
      <text x="30" y="35" fill="#D4B48A" font-size="11" font-weight="800" text-anchor="middle">JR</text>
      <text x="58" y="26" fill="#fff" font-size="12" font-weight="700">Jorge Reyes</text>
      <text x="58" y="42" fill="#888" font-size="10">Kinetic MX · Shopify</text>
      <rect x="270" y="18" width="66" height="22" rx="11" fill="none" stroke="#D4B48A" stroke-opacity="0.6"/>
      <text x="303" y="33" fill="#D4B48A" font-size="9" font-weight="800" text-anchor="middle">WARM · 68</text>
      <text x="348" y="35" fill="#666" font-size="9">34m</text>
    </g>

    <!-- WARM 2 -->
    <g transform="translate(20,190)">
      <rect width="380" height="60" rx="8" fill="#1a1a1a" stroke="#2a2a2a"/>
      <circle cx="30" cy="30" r="14" fill="#D4B48A" fill-opacity="0.22"/>
      <text x="30" y="35" fill="#D4B48A" font-size="11" font-weight="800" text-anchor="middle">AS</text>
      <text x="58" y="26" fill="#fff" font-size="12" font-weight="700">Ana Sánchez</text>
      <text x="58" y="42" fill="#888" font-size="10">Biloom · Tiendanube</text>
      <rect x="270" y="18" width="66" height="22" rx="11" fill="none" stroke="#D4B48A" stroke-opacity="0.6"/>
      <text x="303" y="33" fill="#D4B48A" font-size="9" font-weight="800" text-anchor="middle">WARM · 55</text>
      <text x="348" y="35" fill="#666" font-size="9">1h</text>
    </g>

    <!-- COLD -->
    <g transform="translate(20,260)">
      <rect width="380" height="60" rx="8" fill="#161616" stroke="#242424"/>
      <circle cx="30" cy="30" r="14" fill="#2f2f2f"/>
      <text x="30" y="35" fill="#888" font-size="11" font-weight="800" text-anchor="middle">DP</text>
      <text x="58" y="26" fill="#bbb" font-size="12" font-weight="700">Daniel Pérez</text>
      <text x="58" y="42" fill="#666" font-size="10">nutri.mx · en curso</text>
      <rect x="280" y="18" width="56" height="22" rx="11" fill="none" stroke="#444"/>
      <text x="308" y="33" fill="#888" font-size="9" font-weight="800" text-anchor="middle">COLD · 28</text>
      <text x="348" y="35" fill="#666" font-size="9">3h</text>
    </g>
  </g>
</svg>
