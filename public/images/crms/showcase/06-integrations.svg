<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" font-family="Barlow, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#C89D69" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#C89D69" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="centerFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg6)"/>

  <!-- Top bar -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#141414" stroke="#232323"/>
  <text x="40" y="45" fill="#C89D69" font-size="12" font-weight="700" letter-spacing="1.5">INTEGRACIONES · 8 ACTIVAS</text>
  <circle cx="740" cy="40" r="6" fill="#4ade80"/>
  <circle cx="740" cy="40" r="9" fill="none" stroke="#4ade80" stroke-opacity="0.35"/>

  <!-- Center glow -->
  <circle cx="400" cy="250" r="180" fill="url(#centerGlow)"/>

  <!-- Connection lines (dotted) -->
  <g stroke="#C89D69" stroke-width="1.3" stroke-opacity="0.45" fill="none" stroke-dasharray="3 4">
    <line x1="400" y1="250" x2="150" y2="130"/>
    <line x1="400" y1="250" x2="400" y2="110"/>
    <line x1="400" y1="250" x2="650" y2="130"/>
    <line x1="400" y1="250" x2="700" y2="260"/>
    <line x1="400" y1="250" x2="650" y2="380"/>
    <line x1="400" y1="250" x2="400" y2="410"/>
    <line x1="400" y1="250" x2="150" y2="380"/>
    <line x1="400" y1="250" x2="100" y2="260"/>
  </g>

  <!-- Pulse animation dots on lines (static positions for snapshot) -->
  <g fill="#C89D69">
    <circle cx="275" cy="190" r="2.2"/>
    <circle cx="400" cy="180" r="2.2"/>
    <circle cx="525" cy="190" r="2.2"/>
    <circle cx="550" cy="250" r="2.2"/>
    <circle cx="525" cy="315" r="2.2"/>
    <circle cx="400" cy="330" r="2.2"/>
    <circle cx="275" cy="315" r="2.2"/>
    <circle cx="250" cy="250" r="2.2"/>
  </g>

  <!-- Center CRM node -->
  <g transform="translate(400,250)">
    <circle r="62" fill="url(#centerFill)" stroke="#C89D69" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle r="74" fill="none" stroke="#C89D69" stroke-opacity="0.15"/>
    <circle r="86" fill="none" stroke="#C89D69" stroke-opacity="0.08"/>
    <text y="-6" fill="#C89D69" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="2">TU CRM</text>
    <text y="14" fill="#fff" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="1">FRESA FIT</text>
  </g>

  <!-- External nodes (8 around the center) -->
  <!-- Top-left: Shopify (S, green) -->
  <g transform="translate(150,130)">
    <circle r="30" fill="#111" stroke="#4ade80" stroke-opacity="0.4"/>
    <text y="5" fill="#4ade80" font-size="18" font-weight="800" text-anchor="middle">S</text>
    <text y="52" fill="#888" font-size="9" font-weight="700" text-anchor="middle">SHOPIFY</text>
  </g>
  <!-- Top-center: Meta (M, blue) -->
  <g transform="translate(400,110)">
    <circle r="30" fill="#111" stroke="#4c8bf5" stroke-opacity="0.5"/>
    <text y="5" fill="#4c8bf5" font-size="18" font-weight="800" text-anchor="middle">M</text>
    <text y="52" fill="#888" font-size="9" font-weight="700" text-anchor="middle">META ADS</text>
  </g>
  <!-- Top-right: Mercado Libre (ML, yellow) -->
  <g transform="translate(650,130)">
    <circle r="30" fill="#111" stroke="#ffd23a" stroke-opacity="0.5"/>
    <text y="5" fill="#ffd23a" font-size="15" font-weight="800" text-anchor="middle">ML</text>
    <text y="52" fill="#888" font-size="9" font-weight="700" text-anchor="middle">MERC. LIBRE</text>
  </g>
  <!-- Right: WhatsApp (W, green) -->
  <g transform="translate(700,260)">
    <circle r="30" fill="#111" stroke="#25d366" stroke-opacity="0.55"/>
    <text y="5" fill="#25d366" font-size="18" font-weight="800" text-anchor="middle">W</text>
    <text y="52" fill="#888" font-size="9" font-weight="700" text-anchor="middle">WHATSAPP</text>
  </g>
  <!-- Bottom-right: TikTok (T, pink) -->
  <g transform="translate(650,380)">
    <circle r="30" fill="#111" stroke="#ff0050" stroke-opacity="0.45"/>
    <text y="5" fill="#ff4d7d" font-size="18" font-weight="800" text-anchor="middle">T</text>
    <text y="-42" fill="#888" font-size="9" font-weight="700" text-anchor="middle">TIKTOK</text>
  </g>
  <!-- Bottom-center: Gmail (@, red) -->
  <g transform="translate(400,410)">
    <circle r="30" fill="#111" stroke="#ea4335" stroke-opacity="0.5"/>
    <text y="6" fill="#ea4335" font-size="20" font-weight="800" text-anchor="middle">@</text>
    <text y="-42" fill="#888" font-size="9" font-weight="700" text-anchor="middle">EMAIL</text>
  </g>
  <!-- Bottom-left: Stripe ($, purple) -->
  <g transform="translate(150,380)">
    <circle r="30" fill="#111" stroke="#8f5fff" stroke-opacity="0.5"/>
    <text y="6" fill="#a482ff" font-size="20" font-weight="800" text-anchor="middle">$</text>
    <text y="-42" fill="#888" font-size="9" font-weight="700" text-anchor="middle">PAGOS</text>
  </g>
  <!-- Left: Analytics (Σ, cyan) -->
  <g transform="translate(100,260)">
    <circle r="30" fill="#111" stroke="#22d3ee" stroke-opacity="0.5"/>
    <text y="6" fill="#22d3ee" font-size="18" font-weight="800" text-anchor="middle">Σ</text>
    <text y="52" fill="#888" font-size="9" font-weight="700" text-anchor="middle">ANALYTICS</text>
  </g>

  <!-- Bottom stat bar -->
  <g transform="translate(40,430)">
    <!-- blank -->
  </g>
</svg>
