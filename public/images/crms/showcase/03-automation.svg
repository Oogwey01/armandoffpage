<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" font-family="Barlow, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <marker id="arrowBeige" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#C89D69"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4ade80"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8f0000"/>
    </marker>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>

  <!-- Top bar -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#141414" stroke="#232323"/>
  <text x="40" y="45" fill="#C89D69" font-size="12" font-weight="700" letter-spacing="1.5">FLUJO · RECUPERACIÓN DE CARRITO</text>
  <circle cx="700" cy="40" r="6" fill="#4ade80"/>
  <text x="714" y="44" fill="#4ade80" font-size="10" font-weight="700">ACTIVO</text>

  <!-- Flow canvas background -->
  <rect x="20" y="80" width="760" height="350" rx="10" fill="#0a0a0a" stroke="#171717"/>

  <!-- Dot grid -->
  <g fill="#141414">
    <circle cx="80" cy="120" r="1.2"/>  <circle cx="140" cy="120" r="1.2"/> <circle cx="200" cy="120" r="1.2"/>
    <circle cx="260" cy="120" r="1.2"/> <circle cx="320" cy="120" r="1.2"/> <circle cx="380" cy="120" r="1.2"/>
    <circle cx="440" cy="120" r="1.2"/> <circle cx="500" cy="120" r="1.2"/> <circle cx="560" cy="120" r="1.2"/>
    <circle cx="620" cy="120" r="1.2"/> <circle cx="680" cy="120" r="1.2"/> <circle cx="740" cy="120" r="1.2"/>
    <circle cx="80" cy="180" r="1.2"/>  <circle cx="140" cy="180" r="1.2"/> <circle cx="200" cy="180" r="1.2"/>
    <circle cx="260" cy="180" r="1.2"/> <circle cx="320" cy="180" r="1.2"/> <circle cx="380" cy="180" r="1.2"/>
    <circle cx="440" cy="180" r="1.2"/> <circle cx="500" cy="180" r="1.2"/> <circle cx="560" cy="180" r="1.2"/>
    <circle cx="620" cy="180" r="1.2"/> <circle cx="680" cy="180" r="1.2"/> <circle cx="740" cy="180" r="1.2"/>
    <circle cx="80" cy="240" r="1.2"/>  <circle cx="140" cy="240" r="1.2"/> <circle cx="200" cy="240" r="1.2"/>
    <circle cx="260" cy="240" r="1.2"/> <circle cx="320" cy="240" r="1.2"/> <circle cx="380" cy="240" r="1.2"/>
    <circle cx="440" cy="240" r="1.2"/> <circle cx="500" cy="240" r="1.2"/> <circle cx="560" cy="240" r="1.2"/>
    <circle cx="620" cy="240" r="1.2"/> <circle cx="680" cy="240" r="1.2"/> <circle cx="740" cy="240" r="1.2"/>
    <circle cx="80" cy="300" r="1.2"/>  <circle cx="140" cy="300" r="1.2"/> <circle cx="200" cy="300" r="1.2"/>
    <circle cx="260" cy="300" r="1.2"/> <circle cx="320" cy="300" r="1.2"/> <circle cx="380" cy="300" r="1.2"/>
    <circle cx="440" cy="300" r="1.2"/> <circle cx="500" cy="300" r="1.2"/> <circle cx="560" cy="300" r="1.2"/>
    <circle cx="620" cy="300" r="1.2"/> <circle cx="680" cy="300" r="1.2"/> <circle cx="740" cy="300" r="1.2"/>
    <circle cx="80" cy="360" r="1.2"/>  <circle cx="140" cy="360" r="1.2"/> <circle cx="200" cy="360" r="1.2"/>
    <circle cx="260" cy="360" r="1.2"/> <circle cx="320" cy="360" r="1.2"/> <circle cx="380" cy="360" r="1.2"/>
    <circle cx="440" cy="360" r="1.2"/> <circle cx="500" cy="360" r="1.2"/> <circle cx="560" cy="360" r="1.2"/>
    <circle cx="620" cy="360" r="1.2"/> <circle cx="680" cy="360" r="1.2"/> <circle cx="740" cy="360" r="1.2"/>
  </g>

  <!-- Connections first (so nodes overlap them) -->
  <!-- Trigger -> Condition -->
  <path d="M210,230 C 240,230 240,230 270,230" stroke="#C89D69" stroke-width="2" fill="none" marker-end="url(#arrowBeige)"/>
  <!-- Condition -> Email (top branch) -->
  <path d="M400,210 C 440,180 460,160 500,150" stroke="#4ade80" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <!-- Condition -> Reassign (bottom branch) -->
  <path d="M400,260 C 440,290 460,310 500,320" stroke="#8f0000" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <!-- Email -> Done -->
  <path d="M620,150 C 660,150 660,230 690,230" stroke="#4ade80" stroke-width="1.8" stroke-dasharray="4 4" fill="none"/>
  <!-- Reassign -> Done -->
  <path d="M620,320 C 660,320 660,230 690,230" stroke="#8f0000" stroke-width="1.8" stroke-dasharray="4 4" fill="none"/>

  <!-- Trigger node -->
  <g transform="translate(90,195)">
    <rect width="120" height="70" rx="10" fill="#111" stroke="#C89D69" stroke-opacity="0.6"/>
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#C89D69"/>
    <text x="14" y="22" fill="#C89D69" font-size="9" font-weight="700" letter-spacing="1.5">TRIGGER</text>
    <text x="14" y="42" fill="#fff" font-size="12" font-weight="700">Carrito</text>
    <text x="14" y="58" fill="#888" font-size="10">abandonado</text>
  </g>

  <!-- Condition (diamond) -->
  <g transform="translate(340,230)">
    <path d="M0,0 L60,-36 L120,0 L60,36 Z" fill="#111" stroke="#C89D69" stroke-opacity="0.4"/>
    <text x="60" y="-4" fill="#C89D69" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="1.5">CONDICIÓN</text>
    <text x="60" y="12" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">valor &gt; $500</text>
  </g>
  <text x="460" y="180" fill="#4ade80" font-size="10" font-weight="700">SÍ</text>
  <text x="460" y="300" fill="#ff9e9e" font-size="10" font-weight="700">NO</text>

  <!-- Action: Email -->
  <g transform="translate(500,115)">
    <rect width="120" height="70" rx="10" fill="#111" stroke="#4ade80" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#4ade80"/>
    <text x="14" y="22" fill="#4ade80" font-size="9" font-weight="700" letter-spacing="1.5">ACCIÓN</text>
    <text x="14" y="42" fill="#fff" font-size="12" font-weight="700">Email +</text>
    <text x="14" y="58" fill="#888" font-size="10">cupón 10%</text>
  </g>

  <!-- Action: Reassign -->
  <g transform="translate(500,285)">
    <rect width="120" height="70" rx="10" fill="#111" stroke="#8f0000" stroke-opacity="0.6"/>
    <rect x="0" y="0" width="4" height="70" rx="2" fill="#8f0000"/>
    <text x="14" y="22" fill="#ff9e9e" font-size="9" font-weight="700" letter-spacing="1.5">ACCIÓN</text>
    <text x="14" y="42" fill="#fff" font-size="12" font-weight="700">SMS de</text>
    <text x="14" y="58" fill="#888" font-size="10">recordatorio</text>
  </g>

  <!-- End -->
  <g transform="translate(690,210)">
    <rect width="80" height="40" rx="20" fill="#0a1b0a" stroke="#4ade80" stroke-opacity="0.55"/>
    <text x="40" y="25" fill="#4ade80" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="1">DONE</text>
  </g>

  <!-- Stats footer -->
  <g transform="translate(40,390)" font-family="Barlow, system-ui, sans-serif">
    <text x="0" y="10" fill="#666" font-size="10" letter-spacing="1.2">EJECUCIONES · 24H</text>
    <text x="170" y="10" fill="#C89D69" font-size="10" font-weight="700">1,248</text>
    <text x="260" y="10" fill="#666" font-size="10" letter-spacing="1.2">RECUPERADO</text>
    <text x="380" y="10" fill="#4ade80" font-size="10" font-weight="700">$18,420</text>
    <text x="480" y="10" fill="#666" font-size="10" letter-spacing="1.2">TASA</text>
    <text x="540" y="10" fill="#4ade80" font-size="10" font-weight="700">27%</text>
  </g>
</svg>
