<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" font-family="Barlow, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#C89D69" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#C89D69" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Top bar -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#141414" stroke="#232323"/>
  <text x="40" y="45" fill="#C89D69" font-size="12" font-weight="700" letter-spacing="1.5">DASHBOARD</text>
  <rect x="140" y="30" width="60" height="20" rx="10" fill="#C89D69" fill-opacity="0.12"/>
  <text x="170" y="43" text-anchor="middle" fill="#C89D69" font-size="9" font-weight="700">HOY</text>
  <rect x="210" y="30" width="60" height="20" rx="10" fill="none" stroke="#262626"/>
  <text x="240" y="43" text-anchor="middle" fill="#666" font-size="9" font-weight="700">7D</text>
  <rect x="280" y="30" width="60" height="20" rx="10" fill="none" stroke="#262626"/>
  <text x="310" y="43" text-anchor="middle" fill="#666" font-size="9" font-weight="700">30D</text>

  <!-- KPI row -->
  <g transform="translate(20,80)">
    <g>
      <rect width="180" height="90" rx="10" fill="#101010" stroke="#1f1f1f"/>
      <text x="16" y="24" fill="#888" font-size="9" font-weight="600" letter-spacing="1.5">VENTAS</text>
      <text x="16" y="56" fill="#fff" font-size="26" font-weight="800">$247K</text>
      <rect x="16" y="68" width="40" height="14" rx="7" fill="#4ade80" fill-opacity="0.15"/>
      <text x="36" y="78" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">+18%</text>
      <polyline points="120,72 130,64 140,68 150,58 160,62 170,48" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(190,0)">
      <rect width="180" height="90" rx="10" fill="#101010" stroke="#1f1f1f"/>
      <text x="16" y="24" fill="#888" font-size="9" font-weight="600" letter-spacing="1.5">LEADS</text>
      <text x="16" y="56" fill="#fff" font-size="26" font-weight="800">1,284</text>
      <rect x="16" y="68" width="40" height="14" rx="7" fill="#C89D69" fill-opacity="0.15"/>
      <text x="36" y="78" text-anchor="middle" fill="#C89D69" font-size="9" font-weight="700">+24%</text>
      <polyline points="120,70 130,66 140,56 150,60 160,50 170,42" fill="none" stroke="#C89D69" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(380,0)">
      <rect width="180" height="90" rx="10" fill="#101010" stroke="#1f1f1f"/>
      <text x="16" y="24" fill="#888" font-size="9" font-weight="600" letter-spacing="1.5">CONVERSIÓN</text>
      <text x="16" y="56" fill="#fff" font-size="26" font-weight="800">4.8%</text>
      <rect x="16" y="68" width="40" height="14" rx="7" fill="#4ade80" fill-opacity="0.15"/>
      <text x="36" y="78" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">+0.6pt</text>
      <polyline points="120,66 130,60 140,62 150,52 160,56 170,46" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(570,0)">
      <rect width="190" height="90" rx="10" fill="#101010" stroke="#1f1f1f"/>
      <text x="16" y="24" fill="#888" font-size="9" font-weight="600" letter-spacing="1.5">CAC</text>
      <text x="16" y="56" fill="#fff" font-size="26" font-weight="800">$112</text>
      <rect x="16" y="68" width="50" height="14" rx="7" fill="#8f0000" fill-opacity="0.28"/>
      <text x="41" y="78" text-anchor="middle" fill="#ff9e9e" font-size="9" font-weight="700">-12%</text>
      <polyline points="130,58 140,62 150,68 160,64 170,74 180,70" fill="none" stroke="#ff9e9e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Main chart area -->
  <g transform="translate(20,190)">
    <rect width="500" height="240" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="30" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">CRECIMIENTO 30D</text>
    <circle cx="140" cy="26" r="3" fill="#C89D69"/>
    <text x="148" y="30" fill="#bbb" font-size="9">Ventas</text>
    <circle cx="200" cy="26" r="3" fill="#4ade80"/>
    <text x="208" y="30" fill="#bbb" font-size="9">Meta ROAS</text>

    <!-- Grid lines -->
    <g stroke="#1a1a1a" stroke-width="1">
      <line x1="40" y1="60" x2="480" y2="60"/>
      <line x1="40" y1="110" x2="480" y2="110"/>
      <line x1="40" y1="160" x2="480" y2="160"/>
      <line x1="40" y1="200" x2="480" y2="200"/>
    </g>
    <!-- Y axis labels -->
    <g fill="#444" font-size="8">
      <text x="34" y="63" text-anchor="end">100</text>
      <text x="34" y="113" text-anchor="end">75</text>
      <text x="34" y="163" text-anchor="end">50</text>
      <text x="34" y="203" text-anchor="end">25</text>
    </g>
    <!-- Area under primary line -->
    <path d="M40,170 L80,150 L120,160 L160,130 L200,140 L240,110 L280,120 L320,90 L360,100 L400,70 L440,80 L480,55 L480,200 L40,200 Z" fill="url(#areaFill)"/>
    <!-- Primary line -->
    <polyline points="40,170 80,150 120,160 160,130 200,140 240,110 280,120 320,90 360,100 400,70 440,80 480,55" fill="none" stroke="#C89D69" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Secondary line -->
    <polyline points="40,180 80,170 120,160 160,150 200,130 240,140 280,120 320,110 360,90 400,100 440,80 480,70" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0"/>
    <!-- Dots -->
    <g fill="#C89D69">
      <circle cx="280" cy="120" r="3"/>
      <circle cx="400" cy="70" r="3"/>
      <circle cx="480" cy="55" r="4"/>
    </g>
  </g>

  <!-- Right side: bar chart / channels -->
  <g transform="translate(540,190)">
    <rect width="240" height="240" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="30" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">POR CANAL</text>

    <g font-family="Barlow, system-ui, sans-serif" font-size="10" fill="#bbb">
      <text x="20" y="70">Meta</text>
      <rect x="70" y="60" width="140" height="12" rx="3" fill="#1e1e1e"/>
      <rect x="70" y="60" width="120" height="12" rx="3" fill="#C89D69"/>
      <text x="216" y="70" fill="#C89D69" font-weight="700">48%</text>

      <text x="20" y="104">ML</text>
      <rect x="70" y="94" width="140" height="12" rx="3" fill="#1e1e1e"/>
      <rect x="70" y="94" width="76" height="12" rx="3" fill="#D4B48A"/>
      <text x="216" y="104" fill="#D4B48A" font-weight="700">31%</text>

      <text x="20" y="138">TikTok</text>
      <rect x="70" y="128" width="140" height="12" rx="3" fill="#1e1e1e"/>
      <rect x="70" y="128" width="36" height="12" rx="3" fill="#B08A55"/>
      <text x="216" y="138" fill="#B08A55" font-weight="700">14%</text>

      <text x="20" y="172">Shopify</text>
      <rect x="70" y="162" width="140" height="12" rx="3" fill="#1e1e1e"/>
      <rect x="70" y="162" width="16" height="12" rx="3" fill="#7a5e3a"/>
      <text x="216" y="172" fill="#B08A55" font-weight="700">7%</text>
    </g>

    <g transform="translate(20,200)">
      <rect width="200" height="24" rx="6" fill="#C89D69" fill-opacity="0.1" stroke="#C89D69" stroke-opacity="0.3"/>
      <text x="12" y="16" fill="#C89D69" font-size="10" font-weight="700">TOTAL</text>
      <text x="188" y="16" fill="#fff" font-size="11" font-weight="800" text-anchor="end">$247,380</text>
    </g>
  </g>
</svg>
