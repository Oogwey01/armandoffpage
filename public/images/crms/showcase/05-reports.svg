<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid slice" font-family="Barlow, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0c0c0c"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="areaFill2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#C89D69" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#C89D69" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg5)"/>

  <!-- Top bar with filters -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="#141414" stroke="#232323"/>
  <text x="40" y="45" fill="#C89D69" font-size="12" font-weight="700" letter-spacing="1.5">REPORTE · Q4 2025</text>
  <!-- Filter chips -->
  <rect x="220" y="30" width="90" height="20" rx="10" fill="#C89D69" fill-opacity="0.15" stroke="#C89D69" stroke-opacity="0.4"/>
  <text x="265" y="43" fill="#C89D69" font-size="9" font-weight="700" text-anchor="middle">CANAL: TODOS</text>
  <rect x="320" y="30" width="86" height="20" rx="10" fill="none" stroke="#2a2a2a"/>
  <text x="363" y="43" fill="#888" font-size="9" font-weight="700" text-anchor="middle">FECHA: 90D</text>
  <rect x="416" y="30" width="76" height="20" rx="10" fill="none" stroke="#2a2a2a"/>
  <text x="454" y="43" fill="#888" font-size="9" font-weight="700" text-anchor="middle">COHORTE</text>
  <!-- Export button -->
  <rect x="680" y="30" width="80" height="20" rx="10" fill="none" stroke="#C89D69" stroke-opacity="0.5"/>
  <text x="720" y="43" fill="#C89D69" font-size="9" font-weight="700" text-anchor="middle">EXPORTAR</text>

  <!-- Top-left: Donut chart -->
  <g transform="translate(20,80)">
    <rect width="240" height="170" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">VENTAS POR CANAL</text>
    <!-- Donut: stroke-dasharray trick on circle -->
    <g transform="translate(120,100)">
      <circle r="42" fill="none" stroke="#1a1a1a" stroke-width="18"/>
      <!-- Meta 48% -->
      <circle r="42" fill="none" stroke="#C89D69" stroke-width="18" stroke-dasharray="126 264" stroke-dashoffset="0" transform="rotate(-90)"/>
      <!-- ML 31% -->
      <circle r="42" fill="none" stroke="#D4B48A" stroke-width="18" stroke-dasharray="82 264" stroke-dashoffset="-126" transform="rotate(-90)"/>
      <!-- TikTok 14% -->
      <circle r="42" fill="none" stroke="#B08A55" stroke-width="18" stroke-dasharray="37 264" stroke-dashoffset="-208" transform="rotate(-90)"/>
      <!-- Shopify 7% -->
      <circle r="42" fill="none" stroke="#7a5e3a" stroke-width="18" stroke-dasharray="18 264" stroke-dashoffset="-245" transform="rotate(-90)"/>
      <text y="-4" fill="#fff" font-size="18" font-weight="800" text-anchor="middle">$247K</text>
      <text y="12" fill="#888" font-size="9" text-anchor="middle">TOTAL</text>
    </g>
  </g>

  <!-- Top-center: Line chart -->
  <g transform="translate(270,80)">
    <rect width="270" height="170" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">INGRESOS · 12 MESES</text>
    <g stroke="#181818">
      <line x1="20" y1="60" x2="250" y2="60"/>
      <line x1="20" y1="100" x2="250" y2="100"/>
      <line x1="20" y1="140" x2="250" y2="140"/>
    </g>
    <path d="M20,140 L40,130 L60,132 L80,120 L100,118 L120,106 L140,100 L160,92 L180,82 L200,78 L220,66 L240,58 L240,158 L20,158 Z" fill="url(#areaFill2)"/>
    <polyline points="20,140 40,130 60,132 80,120 100,118 120,106 140,100 160,92 180,82 200,78 220,66 240,58" fill="none" stroke="#C89D69" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="240" cy="58" r="3" fill="#C89D69"/>
    <text x="232" y="50" fill="#C89D69" font-size="9" font-weight="700" text-anchor="end">$34K</text>
  </g>

  <!-- Top-right: Big number -->
  <g transform="translate(550,80)">
    <rect width="230" height="170" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">ROAS PROMEDIO</text>
    <text x="20" y="90" fill="#C89D69" font-size="48" font-weight="800">4.5×</text>
    <rect x="20" y="108" width="70" height="18" rx="9" fill="#4ade80" fill-opacity="0.14"/>
    <text x="55" y="121" fill="#4ade80" font-size="10" font-weight="700" text-anchor="middle">+0.8 vs Q3</text>
    <text x="20" y="150" fill="#888" font-size="10">meta anual: 3.5×</text>
    <rect x="20" y="156" width="190" height="4" rx="2" fill="#1e1e1e"/>
    <rect x="20" y="156" width="160" height="4" rx="2" fill="#C89D69"/>
  </g>

  <!-- Bottom: Table -->
  <g transform="translate(20,260)">
    <rect width="760" height="170" rx="10" fill="#101010" stroke="#1f1f1f"/>
    <text x="20" y="28" fill="#888" font-size="10" font-weight="700" letter-spacing="1.5">DETALLE POR CAMPAÑA</text>

    <!-- Header row -->
    <g fill="#666" font-size="9" font-weight="700" letter-spacing="1">
      <text x="20" y="56">CAMPAÑA</text>
      <text x="260" y="56">CANAL</text>
      <text x="360" y="56">IMPRESIONES</text>
      <text x="490" y="56">CTR</text>
      <text x="560" y="56">CONV.</text>
      <text x="630" y="56">ROAS</text>
      <text x="700" y="56">INGRESO</text>
    </g>
    <line x1="20" y1="66" x2="740" y2="66" stroke="#1e1e1e"/>

    <!-- Row 1 -->
    <g font-size="11">
      <text x="20" y="88" fill="#fff" font-weight="700">ADV · Primavera 25</text>
      <rect x="260" y="76" width="58" height="16" rx="8" fill="#C89D69" fill-opacity="0.18"/>
      <text x="289" y="88" fill="#C89D69" font-size="9" font-weight="700" text-anchor="middle">META</text>
      <text x="360" y="88" fill="#bbb">412,800</text>
      <text x="490" y="88" fill="#bbb">3.8%</text>
      <text x="560" y="88" fill="#bbb">1,240</text>
      <text x="630" y="88" fill="#4ade80" font-weight="700">5.2×</text>
      <text x="700" y="88" fill="#fff" font-weight="800">$62,400</text>
    </g>
    <line x1="20" y1="100" x2="740" y2="100" stroke="#171717"/>

    <!-- Row 2 -->
    <g font-size="11">
      <text x="20" y="120" fill="#fff" font-weight="700">ML · Cinturones Core</text>
      <rect x="260" y="108" width="58" height="16" rx="8" fill="#D4B48A" fill-opacity="0.18"/>
      <text x="289" y="120" fill="#D4B48A" font-size="9" font-weight="700" text-anchor="middle">ML</text>
      <text x="360" y="120" fill="#bbb">218,600</text>
      <text x="490" y="120" fill="#bbb">4.4%</text>
      <text x="560" y="120" fill="#bbb">952</text>
      <text x="630" y="120" fill="#4ade80" font-weight="700">4.1×</text>
      <text x="700" y="120" fill="#fff" font-weight="800">$41,800</text>
    </g>
    <line x1="20" y1="132" x2="740" y2="132" stroke="#171717"/>

    <!-- Row 3 -->
    <g font-size="11">
      <text x="20" y="152" fill="#fff" font-weight="700">TikTok · Reto 30 días</text>
      <rect x="260" y="140" width="58" height="16" rx="8" fill="#B08A55" fill-opacity="0.2"/>
      <text x="289" y="152" fill="#B08A55" font-size="9" font-weight="700" text-anchor="middle">TIKTOK</text>
      <text x="360" y="152" fill="#bbb">98,200</text>
      <text x="490" y="152" fill="#bbb">5.1%</text>
      <text x="560" y="152" fill="#bbb">486</text>
      <text x="630" y="152" fill="#C89D69" font-weight="700">3.8×</text>
      <text x="700" y="152" fill="#fff" font-weight="800">$18,720</text>
    </g>
  </g>
</svg>
